name: Muso probe (one-off)

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Probe Muso API
        env:
          MUSO_API_KEY: ${{ secrets.MUSO_API_KEY }}
        run: node scripts/muso-probe.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: muso-probe-result
          path: muso-probe-result.json
